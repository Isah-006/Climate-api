<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Estudos</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background-color: #f4f4f9; 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: background-color 0.8s ease; /* Transição mais suave */
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { margin-top: 0; color: #333; }
        input {
            width: 100%; padding: 10px; margin: 10px 0;
            border: 1px solid #ccc; border-radius: 6px;
        }
        button {
            width: 100%; padding: 10px; border: none; border-radius: 6px;
            background-color: #007bff; color: white; font-weight: bold;
            cursor: pointer; margin-top: 10px;
        }
        button:hover { background-color: #0056b3; }
        #mensagemErro { color: red; font-size: 14px; margin-top: 10px; }
        .escondido { display: none; }
        #resultadoClima { margin-top: 20px; padding: 15px; border-radius: 8px; background: rgba(255, 255, 255, 0.8); }
        #tempDisplay { font-size: 36px; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="telaLogin" class="container">
        <h2>Acesso ao Dashboard</h2>
        <input type="email" id="email" placeholder="Seu e-mail" required>
        <input type="password" id="senha" placeholder="Sua senha" required>
        <button onclick="fazerLogin()">Entrar</button>
        <div id="mensagemErro"></div>
    </div>

    <div id="telaDashboard" class="container escondido">
        <h2>🌤️ Clima e Estudos</h2>
        <p>Informe a cidade para receber sua recomendação:</p>
        
        <input type="text" id="cidade" placeholder="Ex: São Paulo, Rio de Janeiro">
        <button onclick="buscarClima()">Analisar Clima</button>
        <button onclick="sair()" style="background-color: #dc3545; margin-top: 10px;">Sair</button>

        <div id="resultadoClima" class="escondido">
            <h3 id="cidadeDisplay"></h3>
            <div id="tempDisplay"></div>
            <p id="recDisplay"></p>
        </div>
    </div>

    <script>
        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const divErro = document.getElementById('mensagemErro');
            
            try {
                const resposta = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });
                const dados = await resposta.json();
                if (resposta.ok) {
                    localStorage.setItem('meuToken', dados.token);
                    document.getElementById('telaLogin').classList.add('escondido');
                    document.getElementById('telaDashboard').classList.remove('escondido');
                    divErro.innerText = '';
                } else {
                    divErro.innerText = dados.erro || 'Falha no login.';
                }
            } catch (erro) {
                divErro.innerText = 'Erro ao conectar ao servidor.';
            }
        }

        async function buscarClima() {
            const cidade = document.getElementById('cidade').value;
            const token = localStorage.getItem('meuToken');
            if (!cidade) return alert('Digite uma cidade!');

            try {
                const resposta = await fetch('/clima', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ cidade })
                });

                const dados = await resposta.json();

                if (resposta.ok) {
                    document.getElementById('resultadoClima').classList.remove('escondido');
                    document.getElementById('cidadeDisplay').innerText = dados.cidade;
                    document.getElementById('tempDisplay').innerText = `${dados.temperatura}°C`;
                    document.getElementById('recDisplay').innerText = dados.recomendacao;

                    // AJUSTE DE CORES CONFORME SOLICITADO
                    const body = document.body;
                    if (dados.temperatura >= 30) {
                        body.style.backgroundColor = '#FF8C00'; // Laranja Forte (Hot)
                    } else if (dados.temperatura <= 15) {
                        body.style.backgroundColor = '#ADD8E6'; // Azul Claro (Cold)
                    } else {
                        body.style.backgroundColor = '#90EE90'; // Verde (Mild)
                    }
                } else {
                    alert(dados.erro || 'Erro ao buscar clima.');
                    if(resposta.status === 401) sair();
                }
            } catch (erro) {
                alert('Erro ao conectar ao servidor.');
            }
        }

        function sair() {
            localStorage.removeItem('meuToken');
            document.getElementById('telaDashboard').classList.add('escondido');
            document.getElementById('resultadoClima').classList.add('escondido');
            document.getElementById('telaLogin').classList.remove('escondido');
            document.body.style.backgroundColor = '#f4f4f9';
        }

        window.onload = () => {
            if(localStorage.getItem('meuToken')) {
                document.getElementById('telaLogin').classList.add('escondido');
                document.getElementById('telaDashboard').classList.remove('escondido');
            }
        };
    </script>
</body>
</html>
